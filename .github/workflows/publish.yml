# Build the Quasar SPA and publish to GitHub Pages.
#
# One-time repo setup:
# 1. Settings → Pages → Build and deployment → Source: "GitHub Actions".
# 2. Push to `main` (or change `branches` below).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install and build
        env:
          GH_PAGES_BASE: /strength-of-thousands/
        run: |
          npm ci
          npm run lint
          npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/spa

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
